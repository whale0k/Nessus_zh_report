# Nessus Report Generator Configuration File
# 配置文件 - 用于自定义报告生成参数

[DEFAULT]
# 客户信息
客户名称 = 饼大预算有限客户
实施公司 = 低声下气实施公司

# 文件路径配置
数据库路径 = nessus_plugins.db
模板文件路径 = ./config/漏洞扫描汇报及修复建议_漏洞排序模板.docx

# API配置
请求超时时间 = 30
最大重试次数 = 3
请求间隔秒数 = 1

# 输出配置
输出目录 = ./reports/
Excel文件前缀 = 漏洞整改表
Word文件前缀 = 漏洞扫描汇报及修复建议

# 翻译配置
# 翻译源优先级 (bing, google)，用逗号分隔
